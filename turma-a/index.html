<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cristóvão Gestão Omnichannel</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f7f5;
color:#222;
}

/* LOGIN */
#loginPage{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#103522,#1a3c2c);
}

.login-box{
background:#fff;
width:430px;
padding:30px;
border-radius:22px;
box-shadow:0 20px 40px rgba(0,0,0,.25);
}

.login-box h1{
text-align:center;
color:#1a3c2c;
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
background:#edf2ef;
border-radius:12px;
}

.login-box button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#1a3c2c;
color:#fff;
font-weight:bold;
cursor:pointer;
margin-bottom:10px;
}

#msg{
text-align:center;
font-weight:bold;
color:#1a3c2c;
}

/* SISTEMA */
#systemPage{
display:none;
}

.topbar{
background:#1a3c2c;
color:#fff;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.layout{
display:flex;
min-height:calc(100vh - 70px);
}

/* SIDEBAR */
.sidebar{
width:90px;
background:#fff;
padding:18px 10px;
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
box-shadow:4px 0 18px rgba(0,0,0,.05);
}

.side-btn{
width:55px;
height:55px;
border:none;
border-radius:18px;
background:#edf5f0;
color:#1a3c2c;
font-size:20px;
cursor:pointer;
position:relative;
}

.side-btn:hover{
background:#1a3c2c;
color:#fff;
}

.badge{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:#fff;
font-size:11px;
padding:3px 6px;
border-radius:20px;
}

/* CONTENT */
.content{
flex:1;
padding:25px;
}

.box{
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,.05);
margin-bottom:20px;
}

.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.filters input,.filters select{
padding:12px;
border:none;
background:#edf2ef;
border-radius:12px;
flex:1;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:18px;
}

.card{
background:#fff;
padding:18px;
border-radius:18px;
box-shadow:0 8px 16px rgba(0,0,0,.05);
}

.card h3{
color:#1a3c2c;
margin-bottom:10px;
}

.price{
font-size:24px;
font-weight:bold;
margin:10px 0;
color:#1a3c2c;
}

.buy{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#1a3c2c;
color:#fff;
font-weight:bold;
cursor:pointer;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
font-size:14px;
}

.action{
padding:7px 10px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:12px;
margin:2px;
font-weight:bold;
color:#fff;
}

.green{background:#1a3c2c;}
.orange{background:#ff9800;}
.blue{background:#2196f3;}
.red{background:#f44336;}

.invoice{
background:#f7faf8;
padding:15px;
border-left:4px solid #1a3c2c;
border-radius:12px;
margin-top:12px;
line-height:1.7;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#fff;
margin-bottom:10px;
border-radius:14px;
}

.cart-item input{
width:70px;
padding:8px;
border:none;
background:#edf2ef;
border-radius:10px;
}

.total-box{
font-size:30px;
font-weight:bold;
color:#1a3c2c;
margin:15px 0;
}

.back-btn{
padding:12px 20px;
border:none;
border-radius:12px;
background:#1a3c2c;
color:#fff;
font-weight:bold;
cursor:pointer;
margin-bottom:20px;
}

#adminArea,
#clientArea,
#cartArea,
#historicoArea{
display:none;
}

@media(max-width:800px){

.layout{
flex-direction:column;
}

.sidebar{
width:100%;
flex-direction:row;
justify-content:center;
}

}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
<div class="login-box">

<h1><i class="fas fa-hard-hat"></i> Cristóvão</h1>

<input type="text" id="email" placeholder="Email">
<input type="password" id="senha" placeholder="Senha">

<button onclick="login()">Entrar</button>
<button onclick="mostrarCadastro()">Criar Conta</button>

<div id="cadastro" style="display:none;margin-top:10px;">
<input type="text" id="nomeCad" placeholder="Nome">
<input type="text" id="endCad" placeholder="Endereço">
<input type="text" id="telCad" placeholder="Telefone">
<input type="text" id="emailCad" placeholder="Email">
<input type="password" id="senhaCad" placeholder="Senha">
<button onclick="cadastrar()">Salvar Cadastro</button>
</div>

<div id="msg"></div>

</div>
</div>

<!-- SISTEMA -->
<div id="systemPage">

<div class="topbar">
<h2>Cristóvão Sistema</h2>
<div id="userInfo"></div>
</div>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">

<button class="side-btn" onclick="alert(usuarioAtual)">
<i class="fas fa-user"></i>
</button>

<button class="side-btn" id="cartBtn" onclick="abrirCarrinho()">
<i class="fas fa-shopping-cart"></i>
<span class="badge" id="cartQtd">0</span>
</button>

<button class="side-btn" onclick="abrirHistorico()">
<i class="fas fa-clock-rotate-left"></i>
</button>

<button class="side-btn" onclick="alert('Suporte: (75)99999-9999')">
<i class="fas fa-question-circle"></i>
</button>

<button class="side-btn" onclick="alert('Cristóvão Materiais de Construção')">
<i class="fas fa-store"></i>
</button>

</div>

<!-- CONTENT -->
<div class="content">

<!-- CLIENTE -->
<div id="clientArea">

<div class="box">
<div class="filters">

<input type="text" id="busca" placeholder="Buscar produto..." onkeyup="renderProdutos()">

<select id="filtro" onchange="renderProdutos()">
<option value="">Todas Categorias</option>
<option value="cimento">Cimento</option>
<option value="ferragem">Ferragem</option>
<option value="hidraulica">Hidráulica</option>
<option value="pintura">Pintura</option>
</select>

</div>
</div>

<div class="grid" id="produtosBox"></div>

</div>

<!-- CARRINHO -->
<div id="cartArea">

<button class="back-btn" onclick="voltarProdutos()">
<i class="fas fa-arrow-left"></i> Voltar Produtos
</button>

<div class="box">

<h2>Carrinho de Compras</h2>

<div id="cartItens"></div>

<select id="pagamento">
<option>Pix</option>
<option>Cartão</option>
<option>Boleto</option>
<option>Dinheiro</option>
</select>

<input type="text" id="enderecoPedido" placeholder="Endereço" style="width:100%;padding:12px;margin-top:10px;border:none;background:#edf2ef;border-radius:12px;">

<input type="text" id="telefonePedido" placeholder="Telefone" style="width:100%;padding:12px;margin-top:10px;border:none;background:#edf2ef;border-radius:12px;">

<div class="total-box" id="totalCarrinho">
R$ 0,00
</div>

<button class="buy" onclick="finalizarCompra()">
Finalizar Compra
</button>

<div id="notaArea"></div>

</div>

</div>

<!-- HISTÓRICO -->
<div id="historicoArea">

<button class="back-btn" onclick="voltarProdutos()">
<i class="fas fa-arrow-left"></i> Voltar Produtos
</button>

<div class="box">
<h2>Histórico de Compras</h2>

<div id="historicoCompras"></div>

</div>

</div>

<!-- ADM -->
<div id="adminArea">

<div class="box">

<h3>Pedidos Realizados</h3>

<table>

<thead>
<tr>
<th>ID</th>
<th>Cliente</th>
<th>Total</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="listaPedidos"></tbody>

</table>

</div>

<div class="grid">

<div class="box">
<h3>Gráfico de Vendas</h3>
<canvas id="grafico"></canvas>
</div>

<div class="box">
<h3>Produtos Mais Vendidos</h3>

<table>
<tbody id="maisVendidosTabela"></tbody>
</table>

</div>

</div>

</div>

</div>
</div>
</div>

<script>

let usuarios = [];
let pedidos = [];
let historicoCompras = [];
let carrinho = [];
let usuarioAtual = "";

const produtos = [
{nome:"Cimento CPII",preco:42,categoria:"cimento"},
{nome:"Tijolo 8 Furos",preco:2,categoria:"cimento"},
{nome:"Martelo",preco:45,categoria:"ferragem"},
{nome:"Serrote",preco:60,categoria:"ferragem"},
{nome:"Cano PVC",preco:58,categoria:"hidraulica"},
{nome:"Tinta Branco",preco:129,categoria:"pintura"}
];

function mostrarCadastro(){
cadastro.style.display="block";
}

function cadastrar(){

usuarios.push({
nome:nomeCad.value,
endereco:endCad.value,
telefone:telCad.value,
email:emailCad.value,
senha:senhaCad.value
});

msg.innerText="Conta criada com sucesso!";

}

function login(){

let e=email.value;
let s=senha.value;

if(e=="ADM" && s=="1234"){
usuarioAtual="Administrador";
abrirSistema(true);
return;
}

let user = usuarios.find(u=>u.email==e && u.senha==s);

if(user){
usuarioAtual=user.nome;
abrirSistema(false);
}else{
msg.innerText="Login inválido";
}

}

function abrirSistema(admin){

loginPage.style.display="none";
systemPage.style.display="block";

userInfo.innerText="Olá, "+usuarioAtual;

if(admin){

adminArea.style.display="block";
clientArea.style.display="none";
cartArea.style.display="none";
historicoArea.style.display="none";

renderPedidos();
grafico();
maisVendidos();

}else{

adminArea.style.display="none";
clientArea.style.display="block";

renderProdutos();

}

}

/* PRODUTOS */

function renderProdutos(){

clientArea.style.display="block";
cartArea.style.display="none";
historicoArea.style.display="none";

let busca = buscaInput();

let filtro = document.getElementById("filtro").value;

produtosBox.innerHTML="";

produtos
.filter(p=>p.nome.toLowerCase().includes(busca))
.filter(p=>filtro=="" || p.categoria==filtro)

.forEach((p,i)=>{

produtosBox.innerHTML += `
<div class="card">

<h3>${p.nome}</h3>

<p>${p.categoria}</p>

<div class="price">
R$ ${p.preco.toFixed(2)}
</div>

<button class="buy" onclick="comprar(${i})">
Comprar
</button>

</div>
`;

});

}

function buscaInput(){
return document.getElementById("busca").value.toLowerCase();
}

function comprar(i){

let item = produtos[i];

let ex = carrinho.find(x=>x.nome==item.nome);

if(ex){
ex.qtd++;
}else{
carrinho.push({...item,qtd:1});
}

atualizarCarrinho();

}

function atualizarCarrinho(){

cartQtd.innerText =
carrinho.reduce((a,b)=>a+b.qtd,0);

}

/* CARRINHO */

function abrirCarrinho(){

clientArea.style.display="none";
cartArea.style.display="block";
historicoArea.style.display="none";

renderCarrinho();

}

function voltarProdutos(){

clientArea.style.display="block";
cartArea.style.display="none";
historicoArea.style.display="none";

}

function renderCarrinho(){

cartItens.innerHTML="";

let total=0;

if(carrinho.length==0){
cartItens.innerHTML="<p>Carrinho vazio</p>";
}

carrinho.forEach((item,i)=>{

let subtotal = item.preco * item.qtd;

total += subtotal;

cartItens.innerHTML += `
<div class="cart-item">

<div>
<b>${item.nome}</b><br>
R$ ${item.preco.toFixed(2)} x ${item.qtd}<br>
<b>Subtotal: R$ ${subtotal.toFixed(2)}</b>
</div>

<div>

<input
type="number"
min="1"
value="${item.qtd}"
onchange="alterarQtd(${i},this.value)"
>

<button
class="action red"
onclick="removerCarrinho(${i})"
>
Remover
</button>

</div>

</div>
`;

});

totalCarrinho.innerText =
"R$ "+total.toFixed(2);

}

function alterarQtd(i,v){

carrinho[i].qtd=parseInt(v);

renderCarrinho();

atualizarCarrinho();

}

function removerCarrinho(i){

carrinho.splice(i,1);

renderCarrinho();

atualizarCarrinho();

}

/* FINALIZAR */

function finalizarCompra(){

if(carrinho.length==0){
alert("Carrinho vazio");
return;
}

let total=0;
let itens="";

carrinho.forEach(p=>{

total += p.preco*p.qtd;

itens += `
${p.nome} x${p.qtd}<br>
`;

});

let id=Math.floor(Math.random()*99999);

let pedido = {
id:id,
cliente:usuarioAtual,
total:total,
pagamento:pagamento.value,
endereco:enderecoPedido.value,
telefone:telefonePedido.value,
itens:itens
};

pedidos.push(pedido);

historicoCompras.push({
cliente:usuarioAtual,
pedido:pedido
});

renderPedidos();

notaArea.innerHTML=`

<div class="invoice">

<b>Pedido Nº ${id}</b><br>

Cliente: ${usuarioAtual}<br><br>

${itens}

<b>Total:</b> R$ ${total.toFixed(2)}<br>

Pagamento: ${pagamento.value}<br>

Endereço: ${enderecoPedido.value}<br>

Telefone: ${telefonePedido.value}<br><br>

<b>Obrigado pela compra!</b><br>

Sua Nota Fiscal será enviada para seu email.

</div>
`;

carrinho=[];

renderCarrinho();

atualizarCarrinho();

}

/* HISTÓRICO */

function abrirHistorico(){

clientArea.style.display="none";
cartArea.style.display="none";
historicoArea.style.display="block";

historicoComprasDiv();

}

function historicoComprasDiv(){

historicoCompras.innerHTML="";

let lista =
historicoCompras.filter(
h=>h.cliente==usuarioAtual
);

if(lista.length==0){

historicoCompras.innerHTML=`
<p>Nenhuma compra realizada.</p>
`;

return;

}

lista.forEach(h=>{

historicoCompras.innerHTML += `

<div class="invoice">

<b>Pedido Nº ${h.pedido.id}</b><br>

Cliente: ${h.pedido.cliente}<br><br>

${h.pedido.itens}

<b>Total:</b>
R$ ${h.pedido.total.toFixed(2)}<br>

Pagamento:
${h.pedido.pagamento}<br>

Endereço:
${h.pedido.endereco}<br>

Telefone:
${h.pedido.telefone}

</div>

`;

});

}

/* ADM */

function renderPedidos(){

listaPedidos.innerHTML="";

if(pedidos.length==0){

listaPedidos.innerHTML=`
<tr>
<td colspan="4">
Nenhum pedido encontrado
</td>
</tr>
`;

}

pedidos.forEach((p,index)=>{

listaPedidos.innerHTML += `

<tr>

<td>${p.id}</td>

<td>${p.cliente}</td>

<td>R$ ${p.total.toFixed(2)}</td>

<td>

<button class="action green">
Emitir NF
</button>

<button class="action blue">
Pedido
</button>

<button
class="action red"
onclick="excluirPedido(${index})"
>
Excluir
</button>

</td>

</tr>

`;

});

}

function excluirPedido(i){

pedidos.splice(i,1);

renderPedidos();

}

function grafico(){

new Chart(document.getElementById("grafico"),{

type:"bar",

data:{

labels:["Jan","Fev","Mar","Abr","Mai"],

datasets:[{

label:"Vendas",

data:[12,19,8,15,22]

}]

}

});

}

function maisVendidos(){

maisVendidosTabela.innerHTML=`

<tr>
<td>Cimento CPII</td>
<td>42</td>
</tr>

<tr>
<td>Tijolo</td>
<td>28</td>
</tr>

<tr>
<td>Martelo</td>
<td>20</td>
</tr>

<tr>
<td>Tinta Branco</td>
<td>15</td>
</tr>

`;

}

</script>

</body>
</html>
